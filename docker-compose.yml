version: "3.8"

services:
  karaoke-web:
    build: .
    container_name: karaoke-web
    ports:
      - "8080:80"
    environment:
      ADMIN_PASSWORD: "supersecret"
      TOP_BANNER_TEXT: "✨ CUSTOM TOP BANNER ✨ LIVE KARAOKE REQUESTS ✨"
      BOTTOM_BANNER_TEXT: "✨ CUSTOM BOTTOM BANNER ✨ Powered by JSON & Emojis ✨"
    volumes:
      - .:/var/www/html
